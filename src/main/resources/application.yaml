spring:
  application:
    name: web
  config:
    import: optional:file:./.env[.properties]

  # Datasource configuration — sử dụng env vars với giá trị mặc định cho local dev
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:platia}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh"
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate settings
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false

  thymeleaf:
    check-template-location: false

  # Tăng giới hạn upload để tránh MaxUploadSizeExceededException
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB


  # Security / OAuth2 — Secrets lấy từ .env hoặc môi trường thực
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [email, profile]
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope: [email, public_profile]
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: ["user:email", "read:user"]
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v24.0/dialog/oauth
            token-uri: https://graph.facebook.com/v24.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v24.0/me?fields=id,name,email,age_range,gender,hometown,birthday

# R2 Storage settings
r2:
  endpoint: ${R2_ENDPOINT}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket: ${R2_BUCKET:platia-img}
  public-url: ${R2_PUBLIC_URL}

# JWT settings
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:18000000}

# Groq AI settings
groq:
  api:
    key: ${GROQ_API_KEY}

# Logging configuration — cho phép override qua môi trường
logging:
  level:
    root: ${LOG_ROOT:INFO}
    com.web: ${LOG_APP:DEBUG}
    org.springframework.security: ${LOG_SECURITY:INFO}
