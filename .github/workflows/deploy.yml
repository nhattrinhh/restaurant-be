name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    
    steps:
      - uses: actions/checkout@v3

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Build image
        run: docker build -t glowryzz/platia:${{ github.run_number }} .

      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: docker push glowryzz/platia:${{ github.run_number }}


      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/app
            ./deploy.sh ${{ github.run_number }} 